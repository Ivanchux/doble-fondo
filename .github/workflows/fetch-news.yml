name: Fetch News

on:
  schedule:
    - cron: '0 */2 * * *'   # cada 2 horas
  workflow_dispatch:          # disparo manual desde GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS feeds
        run: python3 scripts/fetch_news.py

      - name: Commit noticias.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/noticias.json
          git diff --cached --quiet || git commit -m "chore: update noticias.json [skip ci]"
          git push
